# bullseye.yaml — convergence targets for this project.
#
# Targets are desired project states expressed as testable properties,
# with dependency tracking and frontier computation. This file is the
# source of truth: read and written by the bullseye MCP server, and safe
# to hand-edit (the targets live below).
#
# What is bullseye / how do I install it?
#   https://github.com/marcelocantos/bullseye
#
# This banner is regenerated by bullseye on every write — edit the
# targets, not these lines.
schema_version: 5
targets:
  T1:
    name: Crosshair runs a minimal convergence loop end-to-end against a real bullseye target
    status: achieved
    value: 5.0
    cost: 3.0
    actual_cost: 3.0
    acceptance:
    - Crosshair binary loads a bullseye.yaml file and enumerates targets with a `strategy` block
    - 'On a tick, crosshair determines whether each strategy-bearing target is satisfied (initially: trust bullseye''s status field; later: pluggable check)'
    - If unsatisfied, crosshair runs the declared command with a per-attempt timeout, captures exit code + stdout/stderr
    - Per-target attempt state (`last_attempt_at`, `last_success_at`, `consecutive_failures`, `cooldown_until`) is persisted to SQLite
    - One real-world target (yadm sync) is converged by the daemon end-to-end on this machine, with the launchd-driven script disabled
    - Daemon runs as a launchd KeepAlive job; restarts are transparent
    - Status of all strategy-bearing targets is queryable via a `crosshair status` CLI subcommand
    context: |-
      Crosshair is the executor side of the bullseye target system. Bullseye owns the YAML schema (target + strategy block, already shipped in bullseye 0.25.0); crosshair owns the runtime that reads strategies and converges targets.

      Mechanical escalation ladder (from the bullseye 🎯T15 design):
      1. Per-attempt timeout (kills hung-action class)
      2. Tick-level backoff (consecutive failures stretch next-attempt: 30m → 2h → 6h)
      3. Circuit break (after N failures, skip attempts for cooldown; surfaces as stalled)
      4. Human notification (alerter at threshold M, push notification at threshold N)
      5. Escalation to agent (opt-in per target)

      Picked as v0.1 because it forces the smallest end-to-end loop: parse strategy, check satisfaction, run command, persist state. Everything else (rich notifications, agent escalation, multi-machine, MCP surface) builds on this skeleton. The yadm convergence is the proof point — it's the original use case that motivated the whole executor design (SSH push hung 9.5h on launchd, blocking subsequent runs).
    origin: bootstrapped from bullseye 🎯T15 design conversation 2026-04-29
    discovered: 2026-04-29
    achieved: 2026-05-10
  T2:
    name: 'Strategy targets honor their trigger: scheduled triggers (cron/interval) only run when due, not every tick'
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - 'A strategy with a `trigger: "cron:<expr>"` runs only when the cron expression is due, not on every tick'
    - A strategy with an interval trigger (e.g. "every:24h") runs at most once per interval, keyed off last_success_at/last_attempt_at
    - 'trigger: "manual" strategies are never auto-run by the tick loop'
    - needs_attempt (or its successor) consults the trigger and the persisted attempt state, replacing the current `!status.is_terminal()` gate that runs non-terminal targets every tick
    - A daily-scheduled strategy is demonstrated running once per day across multiple ticks in a test
    context: 'The `trigger` field already exists in the schema (src/schema.rs Strategy.trigger) and parses values like \"cron:0 * * * *\", but v0.1.0''s tick loop ignores it: converge_one runs every non-terminal strategy target each tick, gated only by failure-backoff cooldown. This makes crosshair unusable for genuinely scheduled (vs. converge-until-satisfied) work. Surfaced 2026-07-04 while trying to migrate ytt''s nightly YouTube ingest onto crosshair (ytt 🎯T7): running ingest every tick would hammer YouTube into IP-blocking. Blocks ytt 🎯T7 (cross-repo).'
    origin: manual
    discovered: 2026-07-04
    achieved: 2026-07-10
  T3:
    name: crosshair's confirmed Fable-audit defects are remediated (process-group kill, bounded drains, store durability)
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - 'CRITICAL (F1/F2/F3, shared root): strategies spawn in their own process group, timeout/drop kills the whole group, and pipe drains are bounded on every arm. Integration tests prove `run_attempt` returns within `timeout + epsilon` and leaves no surviving descendant for (a) a hung command with a pipe-holding grandchild, (b) a backgrounding command on the happy path, and (c) a subsequent target in the same tick still executes. (F1 = timeout hangs the tick loop forever.)'
    - 'F4: `Store::open` sets WAL + a non-zero `busy_timeout`, and a persist failure still yields a next-tick cooldown; a concurrent `status`-poll + failing-strategy test shows `consecutive_failures`/`cooldown_until` advance monotonically with no backoff-free re-runs.'
    context: 'Fable-5 deep audit 2026-07; 4 candidate findings entered synthesis, all 4 two-lens confirmed (0 refuted). F1 (timeout kills only the `sh` PID, then the drain await hangs the entire tick loop forever) is the confirmed CRITICAL. Full report: docs/audit/fable-2026-07.md.'
    tags:
    - fable-audit
    origin: manual
    discovered: 2026-07-08
    achieved: 2026-07-10
  T4:
    name: Crosshair pull requests run formatting, Clippy, and tests in GitHub Actions
    status: identified
    value: 0.0
    cost: 0.0
    acceptance:
    - A pull request runs cargo fmt --check, cargo clippy with warnings denied, and cargo test on GitHub Actions.
    - The workflow uses the stable Rust toolchain and Swatinem/rust-cache.
    context: 'Discovered during v0.2.0 release preparation: the repository had only a release-triggered workflow, leaving pull requests without a CI gate.'
    origin: release audit 2026-07-11
    discovered: 2026-07-11
